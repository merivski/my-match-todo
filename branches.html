<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Branches</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F4F7F4;
    --surface:#FFFFFF;
    --ink:#16241C;
    --ink-soft:#62716A;
    --line:#E2E8E3;
    --accent:#15B86A;
    --accent-deep:#0E8B4F;
    --accent-tint:#E4F6EC;
    --danger:#D2553E;
    --shadow:0 1px 2px rgba(16,40,28,.06), 0 8px 24px rgba(16,40,28,.06);
    --radius:14px;
    --panel-w:344px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:'Inter',system-ui,sans-serif;
    color:var(--ink);
    background:var(--bg);
    overflow:hidden;
    -webkit-font-smoothing:antialiased;
  }

  /* ---------- top bar ---------- */
  .topbar{
    position:fixed;top:0;left:0;right:0;height:60px;z-index:30;
    display:flex;align-items:center;gap:14px;
    padding:0 18px;
    background:rgba(244,247,244,.82);
    backdrop-filter:blur(10px);
    border-bottom:1px solid var(--line);
  }
  .brand{display:flex;align-items:center;gap:9px;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:19px;letter-spacing:-.02em}
  .brand .mark{width:16px;height:16px;border-radius:50%;background:var(--accent);position:relative;flex:none}
  .brand .mark::before,.brand .mark::after{content:"";position:absolute;width:7px;height:7px;border-radius:50%;background:var(--accent);opacity:.45}
  .brand .mark::before{top:-9px;left:11px}
  .brand .mark::after{top:13px;left:11px}
  .spacer{flex:1}
  .btn{
    font-family:'Inter',sans-serif;font-size:13.5px;font-weight:500;
    display:inline-flex;align-items:center;gap:6px;
    padding:8px 13px;border-radius:9px;border:1px solid var(--line);
    background:var(--surface);color:var(--ink);cursor:pointer;
    transition:border-color .15s,background .15s,transform .05s;
    white-space:nowrap;
  }
  .btn:hover{border-color:#c9d4cc}
  .btn:active{transform:translateY(1px)}
  .btn.primary{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}
  .btn.primary:hover{background:var(--accent-deep);border-color:var(--accent-deep)}
  .btn.icon{padding:8px;width:36px;justify-content:center}
  .btn svg{width:16px;height:16px}
  .zoomgroup{display:flex;border:1px solid var(--line);border-radius:9px;overflow:hidden;background:var(--surface)}
  .zoomgroup .btn{border:none;border-radius:0;border-left:1px solid var(--line)}
  .zoomgroup .btn:first-child{border-left:none}

  /* ---------- canvas ---------- */
  .stage{position:fixed;inset:60px 0 0 0;overflow:hidden;cursor:grab;background:
    radial-gradient(circle at 1px 1px, rgba(22,36,28,.05) 1px, transparent 0);
    background-size:26px 26px;}
  .stage.panning{cursor:grabbing}
  .world{position:absolute;top:0;left:0;transform-origin:0 0;will-change:transform}
  .links{position:absolute;top:0;left:0;overflow:visible;pointer-events:none}
  .link{fill:none;stroke:var(--accent);stroke-width:2;opacity:.5}

  /* ---------- node ---------- */
  .node{
    position:absolute;
    display:flex;align-items:center;gap:8px;
    min-width:148px;max-width:230px;height:46px;
    padding:0 12px 0 13px;
    background:var(--surface);
    border:1px solid var(--line);
    border-left:3px solid var(--accent);
    border-radius:var(--radius);
    box-shadow:var(--shadow);
    cursor:pointer;
    user-select:none;
    transition:box-shadow .15s,border-color .15s,transform .12s;
  }
  .node:hover{border-color:#cfdbd3;border-left-color:var(--accent)}
  .node.root{
    background:var(--accent);border-color:var(--accent);border-left-color:var(--accent);
    color:#fff;height:50px;font-weight:600;
  }
  .node.root .count{color:rgba(255,255,255,.85)}
  .node.selected{box-shadow:0 0 0 3px var(--accent-tint),0 0 0 4px var(--accent),var(--shadow)}
  .node.appear{animation:pop .26s cubic-bezier(.2,.8,.3,1)}
  @keyframes pop{from{opacity:0;transform:scale(.7)}to{opacity:1;transform:scale(1)}}

  .node .label{
    font-family:'Space Grotesk',sans-serif;font-weight:500;font-size:14.5px;
    letter-spacing:-.01em;line-height:1.15;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;
  }
  .node .label-input{
    font-family:'Space Grotesk',sans-serif;font-weight:500;font-size:14.5px;
    border:none;outline:none;background:transparent;color:inherit;flex:1;width:100%;
    padding:0;
  }
  .node .count{
    font-size:11px;font-variant-numeric:tabular-nums;color:var(--ink-soft);
    background:var(--accent-tint);border-radius:20px;padding:2px 7px;font-weight:600;
    flex:none;
  }
  .node.root .count{background:rgba(255,255,255,.2)}
  .node .caret{
    position:absolute;right:-12px;top:50%;transform:translateY(-50%);
    width:22px;height:22px;border-radius:50%;
    background:var(--surface);border:1px solid var(--line);
    display:flex;align-items:center;justify-content:center;
    font-size:10px;color:var(--ink-soft);z-index:2;
  }
  .node .caret:hover{border-color:var(--accent);color:var(--accent)}
  .node .caret.collapsed{background:var(--accent);border-color:var(--accent);color:#fff}
  .node .add{
    position:absolute;right:-13px;top:50%;transform:translateY(-50%);
    width:24px;height:24px;border-radius:50%;
    background:var(--accent);color:#fff;border:2px solid var(--bg);
    display:none;align-items:center;justify-content:center;
    font-size:15px;line-height:1;z-index:3;
  }
  .node:hover .add{display:flex}
  .node .add:hover{background:var(--accent-deep)}
  /* when a node has visible children, the caret sits at the right; the add button shifts down */
  .node.has-children .add{right:-13px;top:auto;bottom:-9px}

  /* ---------- focus panel ---------- */
  .panel{
    position:fixed;top:60px;right:0;bottom:0;width:var(--panel-w);z-index:25;
    background:var(--surface);border-left:1px solid var(--line);
    display:flex;flex-direction:column;
    transform:translateX(100%);transition:transform .24s cubic-bezier(.3,.7,.3,1);
    box-shadow:-8px 0 30px rgba(16,40,28,.05);
  }
  .panel.open{transform:translateX(0)}
  .panel-head{padding:18px 20px 14px;border-bottom:1px solid var(--line)}
  .crumbs{font-size:12px;color:var(--ink-soft);margin-bottom:9px;line-height:1.5;word-break:break-word}
  .crumbs .sep{opacity:.5;margin:0 5px}
  .crumbs .here{color:var(--accent-deep);font-weight:600}
  .panel-title{
    font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:21px;letter-spacing:-.02em;
    width:100%;border:none;outline:none;background:transparent;color:var(--ink);
    padding:2px 4px;margin:-2px -4px;border-radius:6px;
  }
  .panel-title:focus{background:var(--accent-tint)}
  .panel-meta{margin-top:8px;font-size:12px;color:var(--ink-soft);font-variant-numeric:tabular-nums;display:flex;align-items:center;gap:8px}
  .progress{flex:1;height:5px;border-radius:5px;background:var(--line);overflow:hidden}
  .progress span{display:block;height:100%;background:var(--accent);border-radius:5px;transition:width .25s}

  .tasks{flex:1;overflow-y:auto;padding:8px 12px 12px}
  .task{
    display:flex;align-items:flex-start;gap:10px;
    padding:9px 8px;border-radius:9px;
    transition:background .12s;
  }
  .task:hover{background:var(--bg)}
  .task .check{
    flex:none;width:19px;height:19px;margin-top:1px;border-radius:6px;
    border:1.6px solid #c4cfc8;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    transition:border-color .12s,background .12s;
  }
  .task .check:hover{border-color:var(--accent)}
  .task.done .check{background:var(--accent);border-color:var(--accent)}
  .task .check svg{width:12px;height:12px;color:#fff;opacity:0;transition:opacity .12s}
  .task.done .check svg{opacity:1}
  .task .txt{flex:1;font-size:14px;line-height:1.4;color:var(--ink);word-break:break-word;cursor:text}
  .task.done .txt{color:var(--ink-soft);text-decoration:line-through}
  .task .del{flex:none;opacity:0;border:none;background:none;color:var(--ink-soft);cursor:pointer;font-size:16px;padding:0 2px;line-height:1}
  .task:hover .del{opacity:1}
  .task .del:hover{color:var(--danger)}
  .task .txt-input{flex:1;font-size:14px;font-family:inherit;border:none;outline:none;background:transparent;color:var(--ink);padding:0}

  .empty{padding:34px 16px;text-align:center;color:var(--ink-soft);font-size:13.5px;line-height:1.6}
  .empty .leaf{font-size:26px;display:block;margin-bottom:8px;opacity:.8}

  .add-task{display:flex;gap:8px;padding:12px;border-top:1px solid var(--line)}
  .add-task input{
    flex:1;font-family:inherit;font-size:14px;padding:10px 12px;
    border:1px solid var(--line);border-radius:9px;outline:none;color:var(--ink);
  }
  .add-task input:focus{border-color:var(--accent)}
  .add-task input::placeholder{color:#a7b3ac}

  .panel-foot{display:flex;gap:8px;padding:10px 12px;border-top:1px solid var(--line)}
  .panel-foot .btn{flex:1;justify-content:center;font-size:13px}
  .btn.ghost-danger{color:var(--danger);border-color:var(--line)}
  .btn.ghost-danger:hover{border-color:var(--danger);background:#fdf2f0}
  .btn.ghost-danger.armed{background:var(--danger);border-color:var(--danger);color:#fff}

  /* ---------- hint ---------- */
  .hint{
    position:fixed;left:18px;bottom:16px;z-index:20;
    font-size:12px;color:var(--ink-soft);
    background:rgba(255,255,255,.7);backdrop-filter:blur(6px);
    padding:7px 12px;border-radius:8px;border:1px solid var(--line);
    pointer-events:none;
  }
  .hint b{color:var(--ink);font-weight:600}

  @media (prefers-reduced-motion:reduce){
    *{animation:none!important;transition:none!important}
  }
  @media (max-width:640px){
    :root{--panel-w:100%}
    .brand span.full{display:none}
    .btn .lbl{display:none}
    .hint{display:none}
  }
</style>
</head>
<body>

  <header class="topbar">
    <div class="brand"><span class="mark"></span><span class="full">Branches</span></div>
    <div class="spacer"></div>
    <button class="btn primary" id="addArea" title="Add a top-level life area">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
      <span class="lbl">Area</span>
    </button>
    <div class="zoomgroup">
      <button class="btn icon" id="zoomOut" title="Zoom out" aria-label="Zoom out">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M5 12h14"/></svg>
      </button>
      <button class="btn icon" id="zoomIn" title="Zoom in" aria-label="Zoom in">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
      </button>
      <button class="btn icon" id="fit" title="Fit to screen" aria-label="Fit to screen">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 9V5a1 1 0 0 1 1-1h4M20 9V5a1 1 0 0 0-1-1h-4M4 15v4a1 1 0 0 0 1 1h4M20 15v4a1 1 0 0 1-1 1h-4"/></svg>
      </button>
    </div>
  </header>

  <div class="stage" id="stage">
    <div class="world" id="world">
      <svg class="links" id="links"></svg>
      <div id="nodes"></div>
    </div>
  </div>

  <div class="hint"><b>Drag</b> to pan · <b>scroll</b> to zoom · <b>double-click</b> a branch to rename</div>

  <aside class="panel" id="panel" aria-label="Branch detail">
    <div class="panel-head">
      <div class="crumbs" id="crumbs"></div>
      <input class="panel-title" id="panelTitle" aria-label="Branch name">
      <div class="panel-meta">
        <span id="metaText">0 of 0 done</span>
        <span class="progress"><span id="progressBar" style="width:0%"></span></span>
      </div>
    </div>
    <div class="tasks" id="tasks"></div>
    <div class="add-task">
      <input id="taskInput" placeholder="Add a task and press Enter" aria-label="New task">
    </div>
    <div class="panel-foot">
      <button class="btn" id="addChild">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
        Sub-branch
      </button>
      <button class="btn ghost-danger" id="delBranch">Delete branch</button>
    </div>
  </aside>

<script>
(function(){
  "use strict";

  // ---------- storage (safe: works in-memory if localStorage is blocked) ----------
  var KEY = "branches.tree.v1";
  function save(){ try{ localStorage.setItem(KEY, JSON.stringify(state.tree)); }catch(e){} }
  function load(){ try{ var r=localStorage.getItem(KEY); return r?JSON.parse(r):null; }catch(e){ return null; } }
  function uid(){ return (Date.now().toString(36)+Math.random().toString(36).slice(2,7)); }

  // ---------- seed ----------
  function seed(){
    return {
      id: uid(), name:"Meri", collapsed:false, todos:[],
      children:[
        { id:uid(), name:"Physical", collapsed:false, todos:[], children:[] },
        { id:uid(), name:"Mental", collapsed:false, todos:[], children:[] },
        { id:uid(), name:"Professional", collapsed:false, todos:[], children:[
          { id:uid(), name:"Freelance", collapsed:false, todos:[], children:[] },
          { id:uid(), name:"Academic", collapsed:false, todos:[], children:[] }
        ]},
        { id:uid(), name:"Cultural", collapsed:false, todos:[], children:[] }
      ]
    };
  }

  var state = {
    tree: load() || seed(),
    selected: null,
    view: { tx:60, ty:0, scale:1 },
    justAdded: null
  };

  // ---------- geometry ----------
  var COL_W = 248, ROW_H = 64, NODE_H = 50;

  function layout(){
    var rowY = 0;
    function walk(node, depth){
      node._x = depth * COL_W;
      var kids = node.children;
      if(node.collapsed || !kids || kids.length===0){
        node._y = rowY * ROW_H;
        rowY++;
      } else {
        for(var i=0;i<kids.length;i++) walk(kids[i], depth+1);
        node._y = (kids[0]._y + kids[kids.length-1]._y) / 2;
      }
    }
    walk(state.tree, 0);
  }

  // ---------- helpers ----------
  function findParent(node, target, parent){
    if(node===target) return parent;
    if(node.collapsed) {/* still search to allow ops */}
    for(var i=0;i<node.children.length;i++){
      var r = findParent(node.children[i], target, node);
      if(r!==undefined) return r;
    }
    return undefined;
  }
  function pathTo(target){
    var path=[];
    (function walk(node, trail){
      var t = trail.concat(node);
      if(node===target){ path = t; return true; }
      for(var i=0;i<node.children.length;i++) if(walk(node.children[i], t)) return true;
      return false;
    })(state.tree, []);
    return path;
  }
  function countTasks(node){
    var done=0, total=node.todos.length;
    for(var i=0;i<node.todos.length;i++) if(node.todos[i].done) done++;
    return {done:done, total:total};
  }

  // ---------- rendering ----------
  var $nodes = document.getElementById("nodes");
  var $links = document.getElementById("links");
  var $world = document.getElementById("world");

  function applyView(){
    var v = state.view;
    $world.style.transform = "translate("+v.tx+"px,"+v.ty+"px) scale("+v.scale+")";
  }

  function render(){
    layout();
    // collect visible nodes
    var nodes=[], links=[];
    (function walk(node){
      nodes.push(node);
      if(!node.collapsed){
        for(var i=0;i<node.children.length;i++){
          links.push([node, node.children[i]]);
          walk(node.children[i]);
        }
      }
    })(state.tree);

    // bounds
    var maxX=0, maxY=0;
    nodes.forEach(function(n){ if(n._x>maxX)maxX=n._x; if(n._y>maxY)maxY=n._y; });
    $links.setAttribute("width", maxX+COL_W);
    $links.setAttribute("height", maxY+ROW_H+NODE_H);

    // links
    var paths="";
    links.forEach(function(pair){
      var p=pair[0], c=pair[1];
      var x1=p._x+nodeWidth(p), y1=p._y+NODE_H/2;
      var x2=c._x, y2=c._y+NODE_H/2;
      var mx=(x1+x2)/2;
      paths += '<path class="link" d="M '+x1+' '+y1+' C '+mx+' '+y1+', '+mx+' '+y2+', '+x2+' '+y2+'"/>';
    });
    $links.innerHTML = paths;

    // nodes
    $nodes.innerHTML="";
    nodes.forEach(function(n){ $nodes.appendChild(buildNode(n)); });

    renderPanel();
  }

  function nodeWidth(n){
    // approximate width used only for link anchoring; real width is auto.
    return n===state.tree ? 132 : 132;
  }

  function buildNode(node){
    var isRoot = node===state.tree;
    var el = document.createElement("div");
    el.className = "node" + (isRoot?" root":"") + (state.selected===node?" selected":"");
    if(node.children.length>0 && !node.collapsed) el.className+=" has-children";
    if(state.justAdded===node.id) el.className+=" appear";
    el.style.left = node._x+"px";
    el.style.top = node._y+"px";

    // label
    var label=document.createElement("div");
    label.className="label";
    label.textContent=node.name;
    el.appendChild(label);

    // task count
    var c=countTasks(node);
    if(c.total>0){
      var badge=document.createElement("span");
      badge.className="count";
      badge.textContent=c.done+"/"+c.total;
      el.appendChild(badge);
    }

    // caret (collapse/expand) if has children
    if(node.children.length>0){
      var caret=document.createElement("div");
      caret.className="caret"+(node.collapsed?" collapsed":"");
      caret.textContent=node.collapsed?node.children.length:"–";
      caret.title=node.collapsed?"Expand":"Collapse";
      caret.addEventListener("click",function(e){
        e.stopPropagation();
        node.collapsed=!node.collapsed; save(); render();
      });
      el.appendChild(caret);
    }

    // add child button
    var add=document.createElement("button");
    add.className="add";
    add.textContent="+";
    add.title="Add sub-branch";
    add.setAttribute("aria-label","Add sub-branch");
    add.addEventListener("click",function(e){ e.stopPropagation(); addChild(node); });
    el.appendChild(add);

    // interactions
    el.addEventListener("click",function(e){ e.stopPropagation(); selectNode(node); });
    el.addEventListener("dblclick",function(e){ e.stopPropagation(); inlineRename(node, label, el, isRoot); });

    return el;
  }

  function inlineRename(node, label, el, isRoot){
    var input=document.createElement("input");
    input.className="label-input";
    input.value=node.name;
    el.replaceChild(input, label);
    input.focus(); input.select();
    function commit(){
      var v=input.value.trim();
      node.name = v || node.name;
      save(); render();
    }
    input.addEventListener("keydown",function(e){
      if(e.key==="Enter"){ commit(); }
      else if(e.key==="Escape"){ render(); }
    });
    input.addEventListener("blur", commit);
    input.addEventListener("click",function(e){ e.stopPropagation(); });
    input.addEventListener("dblclick",function(e){ e.stopPropagation(); });
  }

  // ---------- branch operations ----------
  function addChild(node){
    var child={ id:uid(), name:"New branch", collapsed:false, todos:[], children:[] };
    node.children.push(child);
    node.collapsed=false;
    state.justAdded=child.id;
    state.selected=child;
    save(); render();
    setTimeout(function(){ state.justAdded=null; }, 300);
    // open the panel and let you rename the fresh branch immediately
    document.getElementById("panel").classList.add("open");
    setTimeout(function(){ document.getElementById("panelTitle").focus(); document.getElementById("panelTitle").select(); }, 60);
  }

  function deleteBranch(node){
    if(node===state.tree) return;
    var parent=findParent(state.tree, node, null);
    if(!parent) return;
    var i=parent.children.indexOf(node);
    if(i>-1) parent.children.splice(i,1);
    state.selected=parent;
    save(); render();
  }

  function selectNode(node){
    state.selected=node;
    document.getElementById("panel").classList.add("open");
    render();
  }

  // ---------- panel ----------
  var $panel=document.getElementById("panel");
  var $crumbs=document.getElementById("crumbs");
  var $panelTitle=document.getElementById("panelTitle");
  var $tasks=document.getElementById("tasks");
  var $taskInput=document.getElementById("taskInput");
  var $metaText=document.getElementById("metaText");
  var $progressBar=document.getElementById("progressBar");

  var _panelNodeId=null;
  function renderPanel(){
    var node=state.selected;
    if(!node){ $panel.classList.remove("open"); _panelNodeId=null; return; }
    if(node.id!==_panelNodeId){ _panelNodeId=node.id; resetDelBtn(); }

    // crumbs
    var path=pathTo(node);
    var html="";
    for(var i=0;i<path.length;i++){
      var last=i===path.length-1;
      html+= (i>0?'<span class="sep">/</span>':'') +
        '<span class="'+(last?'here':'')+'">'+escapeHtml(path[i].name)+'</span>';
    }
    $crumbs.innerHTML=html;

    $panelTitle.value=node.name;

    var c=countTasks(node);
    $metaText.textContent=c.done+" of "+c.total+" done";
    $progressBar.style.width=(c.total? Math.round(c.done/c.total*100):0)+"%";

    // tasks
    $tasks.innerHTML="";
    if(node.todos.length===0){
      var empty=document.createElement("div");
      empty.className="empty";
      empty.innerHTML='<span class="leaf">🌱</span>No tasks on this branch yet.<br>Add the first one below.';
      $tasks.appendChild(empty);
    } else {
      node.todos.forEach(function(t){ $tasks.appendChild(buildTask(node,t)); });
    }

    document.getElementById("delBranch").style.display = (node===state.tree)?"none":"";
  }

  function buildTask(node, t){
    var row=document.createElement("div");
    row.className="task"+(t.done?" done":"");

    var check=document.createElement("div");
    check.className="check";
    check.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>';
    check.addEventListener("click",function(){ t.done=!t.done; save(); render(); });
    row.appendChild(check);

    var txt=document.createElement("div");
    txt.className="txt";
    txt.textContent=t.text;
    txt.title="Click to edit";
    txt.addEventListener("click",function(){ editTask(node,t,txt,row); });
    row.appendChild(txt);

    var del=document.createElement("button");
    del.className="del"; del.textContent="×"; del.title="Delete task";
    del.addEventListener("click",function(){
      var i=node.todos.indexOf(t); if(i>-1) node.todos.splice(i,1); save(); render();
    });
    row.appendChild(del);
    return row;
  }

  function editTask(node,t,txt,row){
    var input=document.createElement("input");
    input.className="txt-input"; input.value=t.text;
    row.replaceChild(input,txt); input.focus(); input.select();
    function commit(){ var v=input.value.trim(); t.text=v||t.text; save(); render(); }
    input.addEventListener("keydown",function(e){
      if(e.key==="Enter") commit(); else if(e.key==="Escape") render();
    });
    input.addEventListener("blur",commit);
  }

  $panelTitle.addEventListener("input",function(){
    if(state.selected){ state.selected.name=$panelTitle.value; }
  });
  $panelTitle.addEventListener("change",function(){
    if(state.selected){ state.selected.name=$panelTitle.value.trim()||state.selected.name; save(); render(); }
  });
  $panelTitle.addEventListener("keydown",function(e){ if(e.key==="Enter"){ e.preventDefault(); $panelTitle.blur(); } });

  $taskInput.addEventListener("keydown",function(e){
    if(e.key==="Enter"){
      var v=$taskInput.value.trim();
      if(v && state.selected){
        state.selected.todos.push({id:uid(), text:v, done:false});
        $taskInput.value=""; save(); render(); $taskInput.focus();
      }
    }
  });

  document.getElementById("addChild").addEventListener("click",function(){
    if(state.selected) addChild(state.selected);
  });
  var delBtn=document.getElementById("delBranch");
  var delTimer=null;
  function resetDelBtn(){ delBtn.textContent="Delete branch"; delBtn.classList.remove("armed"); if(delTimer){clearTimeout(delTimer);delTimer=null;} }
  delBtn.addEventListener("click",function(){
    if(!state.selected || state.selected===state.tree) return;
    if(!delBtn.classList.contains("armed")){
      delBtn.textContent="Tap again to delete";
      delBtn.classList.add("armed");
      delTimer=setTimeout(resetDelBtn,3000);
      return;
    }
    resetDelBtn();
    deleteBranch(state.selected);
  });
  document.getElementById("addArea").addEventListener("click",function(){
    addChild(state.tree);
  });

  function escapeHtml(s){ return s.replace(/[&<>"]/g,function(m){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[m];}); }

  // ---------- pan & zoom ----------
  var stage=document.getElementById("stage");
  var dragging=false, sx=0, sy=0, startTx=0, startTy=0, moved=false;

  stage.addEventListener("mousedown",function(e){
    if(e.target.closest(".node")||e.target.closest(".caret")||e.target.closest(".add")) return;
    dragging=true; moved=false; sx=e.clientX; sy=e.clientY;
    startTx=state.view.tx; startTy=state.view.ty;
    stage.classList.add("panning");
  });
  window.addEventListener("mousemove",function(e){
    if(!dragging) return;
    var dx=e.clientX-sx, dy=e.clientY-sy;
    if(Math.abs(dx)+Math.abs(dy)>3) moved=true;
    state.view.tx=startTx+dx; state.view.ty=startTy+dy; applyView();
  });
  window.addEventListener("mouseup",function(){
    if(dragging && !moved){ /* background click: keep selection */ }
    dragging=false; stage.classList.remove("panning");
  });

  stage.addEventListener("wheel",function(e){
    e.preventDefault();
    var v=state.view;
    var rect=stage.getBoundingClientRect();
    var px=e.clientX-rect.left, py=e.clientY-rect.top;
    var factor = e.deltaY<0 ? 1.12 : 1/1.12;
    var ns=Math.min(2.2, Math.max(0.25, v.scale*factor));
    var k=ns/v.scale;
    v.tx = px - (px - v.tx)*k;
    v.ty = py - (py - v.ty)*k;
    v.scale=ns; applyView();
  },{passive:false});

  // basic touch pan
  var lastTouch=null;
  stage.addEventListener("touchstart",function(e){
    if(e.target.closest(".node")) return;
    if(e.touches.length===1){ lastTouch={x:e.touches[0].clientX,y:e.touches[0].clientY}; }
  },{passive:true});
  stage.addEventListener("touchmove",function(e){
    if(e.touches.length===1 && lastTouch){
      var t=e.touches[0];
      state.view.tx+=t.clientX-lastTouch.x;
      state.view.ty+=t.clientY-lastTouch.y;
      lastTouch={x:t.clientX,y:t.clientY}; applyView();
    }
  },{passive:true});
  stage.addEventListener("touchend",function(){ lastTouch=null; });

  document.getElementById("zoomIn").addEventListener("click",function(){ zoomBy(1.18); });
  document.getElementById("zoomOut").addEventListener("click",function(){ zoomBy(1/1.18); });
  function zoomBy(f){
    var v=state.view, rect=stage.getBoundingClientRect();
    var px=rect.width/2, py=rect.height/2;
    var ns=Math.min(2.2,Math.max(0.25,v.scale*f)), k=ns/v.scale;
    v.tx=px-(px-v.tx)*k; v.ty=py-(py-v.ty)*k; v.scale=ns; applyView();
  }

  document.getElementById("fit").addEventListener("click",fit);
  function fit(){
    layout();
    var minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
    (function walk(n){
      minX=Math.min(minX,n._x); minY=Math.min(minY,n._y);
      maxX=Math.max(maxX,n._x+200); maxY=Math.max(maxY,n._y+NODE_H);
      if(!n.collapsed) n.children.forEach(walk);
    })(state.tree);
    var rect=stage.getBoundingClientRect();
    var pad=60;
    var w=maxX-minX, h=maxY-minY;
    var s=Math.min((rect.width-pad*2)/w, (rect.height-pad*2)/h, 1.4);
    s=Math.max(0.25,s);
    state.view.scale=s;
    state.view.tx=pad - minX*s + (rect.width-pad*2 - w*s)/2;
    state.view.ty=pad - minY*s + (rect.height-pad*2 - h*s)/2;
    applyView();
  }

  // ---------- keyboard ----------
  window.addEventListener("keydown",function(e){
    if(e.key==="Escape"){
      if(document.activeElement && (document.activeElement.tagName==="INPUT")) { document.activeElement.blur(); return; }
      state.selected=null; document.getElementById("panel").classList.remove("open"); render();
    }
  });

  // ---------- init ----------
  render();
  applyView();
  setTimeout(fit, 30);

})();
</script>
</body>
</html>
